<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" role="img" aria-label="The World Bank Group">
  <defs>
    <radialGradient id="globeGrad" cx="35%" cy="32%" r="78%" fx="38%" fy="28%">
      <stop offset="0%"  stop-color="#9ad4f7"/>
      <stop offset="22%" stop-color="#3a9bdb"/>
      <stop offset="60%" stop-color="#0e5a96"/>
      <stop offset="100%" stop-color="#002a4d"/>
    </radialGradient>
    <radialGradient id="globeHi" cx="32%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="45" cy="45" r="40"/>
    </clipPath>
  </defs>

  <!-- Globe sphere -->
  <circle cx="45" cy="45" r="40" fill="url(#globeGrad)"/>

  <!-- Meridian lines (clipped to globe) -->
  <g clip-path="url(#globeClip)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
    <!-- Equator -->
    <ellipse cx="45" cy="45" rx="40" ry="13"/>
    <!-- Tropics / latitudes (faint) -->
    <ellipse cx="45" cy="45" rx="40" ry="26" stroke-width="1.4" opacity="0.5"/>
    <!-- Prime meridian -->
    <ellipse cx="45" cy="45" rx="13" ry="40"/>
    <!-- Offset meridians -->
    <ellipse cx="45" cy="45" rx="26" ry="40" stroke-width="1.4" opacity="0.5"/>
    <!-- Polar axis -->
    <line x1="45" y1="5" x2="45" y2="85"/>
  </g>

  <!-- Specular highlight -->
  <circle cx="45" cy="45" r="40" fill="url(#globeHi)"/>

  <!-- Outer ring -->
  <circle cx="45" cy="45" r="40" fill="none" stroke="#002a4d" stroke-width="2"/>

  <!-- Wordmark -->
  <g font-family="Open Sans, -apple-system, Segoe UI, sans-serif" font-weight="800" font-size="24" fill="#002a4d" letter-spacing="0.6">
    <text x="100" y="55">WORLD BANK GROUP</text>
  </g>
</svg>
